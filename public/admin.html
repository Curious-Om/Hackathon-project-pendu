<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Blind Typing Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: white;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .login-card {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 16px;
        }

        .login-card input::placeholder {
            color: #888;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-card button:hover {
            background: #c73e54;
        }

        .dashboard {
            display: none;
        }

        .header {
            background: #16213e;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }

        .header h1 {
            color: #e94560;
        }

        .header button {
            padding: 10px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .main-content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: #e94560;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* Test Control */
        .test-control {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .test-control select,
        .test-control input {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 16px;
        }

        .test-control label {
            color: #888;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: #4ecca3;
            color: #1a1a2e;
            flex: 1;
        }

        .btn-stop {
            background: #e94560;
            color: white;
            flex: 1;
        }

        .test-status {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-active {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
            border: 1px solid #4ecca3;
        }

        .status-inactive {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid #e94560;
        }

        /* Paragraph Management */
        .paragraph-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .paragraph-item {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .paragraph-item .text {
            flex: 1;
            word-break: break-word;
        }

        .paragraph-item .actions {
            display: flex;
            gap: 5px;
        }

        .paragraph-item button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .add-paragraph {
            margin-top: 15px;
        }

        .add-paragraph textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 14px;
            min-height: 80px;
            resize: vertical;
        }

        .add-paragraph button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        /* Results Table */
        .results-table-container {
            overflow-x: auto;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }

        .results-table th {
            background: #0f3460;
            color: #e94560;
        }

        .results-table tr:hover {
            background: rgba(15, 52, 96, 0.5);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .btn-clear {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            margin-bottom: 15px;
        }

        .hidden {
            display: none !important;
        }

        /* Modal for editing */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }

        .modal-content h3 {
            color: #e94560;
            margin-bottom: 20px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 16px;
            min-height: 150px;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-save {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .btn-cancel {
            background: #666;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div class="login-container" id="loginSection">
        <div class="login-card">
            <h1>🔐 Admin Login</h1>
            <input type="text" id="username" placeholder="Username" value="admin">
            <input type="password" id="password" placeholder="Password" value="admin123">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div class="dashboard" id="dashboard">
        <header class="header">
            <h1>📊 Admin Dashboard</h1>
            <button onclick="logout()">Logout</button>
        </header>

        <div class="main-content">
            <!-- Test Control -->
            <div class="card">
                <h2>🎮 Test Control</h2>
                <div class="test-control">
                    <div>
                        <label>Select Paragraph:</label>
                        <select id="paragraphSelect">
                            <option value="">-- Select Paragraph --</option>
                        </select>
                    </div>
                    <div>
                        <label>Time Limit (seconds):</label>
                        <input type="number" id="timeLimit" value="60" min="10" max="600">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="startBtn" onclick="startTest()">▶ Start Test</button>
                        <button class="btn btn-stop" id="stopBtn" onclick="stopTest()" disabled>⏹ Stop Test</button>
                    </div>
                    <div class="test-status status-inactive" id="testStatus">
                        Test is NOT active
                    </div>
                </div>
            </div>

            <!-- Paragraph Management -->
            <div class="card">
                <h2>📝 Paragraph Management</h2>
                <div class="paragraph-list" id="paragraphList"></div>
                <div class="add-paragraph">
                    <textarea id="newParagraph" placeholder="Enter new paragraph text..."></textarea>
                    <button onclick="addParagraph()">+ Add Paragraph</button>
                </div>
            </div>

            <!-- Results -->
            <div class="card full-width">
                <h2>📈 Results Dashboard</h2>
                <button class="btn-clear" onclick="clearResults()">🗑 Clear All Results</button>
                <div class="results-table-container">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Participant</th>
                                <th>WPM</th>
                                <th>CPM</th>
                                <th>Accuracy</th>
                                <th>Final Score</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody"></tbody>
                    </table>
                    <div class="no-results hidden" id="noResults">No results yet</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal hidden" id="editModal">
        <div class="modal-content">
            <h3>Edit Paragraph</h3>
            <textarea id="editParagraphText"></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let paragraphs = [];
        let editingId = null;

        // Login
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadDashboard();
                } else {
                    alert('Invalid credentials!');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed!');
            }
        }

        function logout() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginSection').style.display = 'flex';
        }

        // Load dashboard data
        async function loadDashboard() {
            await loadParagraphs();
            await loadResults();
            await checkTestState();
            
            // Poll for results and state
            setInterval(loadResults, 5000);
            setInterval(checkTestState, 2000);
        }

        // Load paragraphs
        async function loadParagraphs() {
            try {
                const response = await fetch('/api/paragraphs');
                paragraphs = await response.json();
                
                // Update paragraph list
                const listHtml = paragraphs.map(p => `
                    <div class="paragraph-item">
                        <div class="text">${escapeHtml(p.text.substring(0, 100))}${p.text.length > 100 ? '...' : ''}</div>
                        <div class="actions">
                            <button class="btn-edit" onclick="editParagraph(${p.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteParagraph(${p.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('paragraphList').innerHTML = listHtml || '<p style="color:#888">No paragraphs added</p>';
                
                // Update select dropdown
                const selectHtml = paragraphs.map(p => 
                    `<option value="${p.id}">${p.text.substring(0, 50)}${p.text.length > 50 ? '...' : ''}</option>`
                ).join('');
                
                document.getElementById('paragraphSelect').innerHTML = '<option value="">-- Select Paragraph --</option>' + selectHtml;
            } catch (error) {
                console.error('Error loading paragraphs:', error);
            }
        }

        // Add paragraph
        async function addParagraph() {
            const text = document.getElementById('newParagraph').value.trim();
            if (!text) {
                alert('Please enter paragraph text');
                return;
            }

            try {
                await fetch('/api/paragraphs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                document.getElementById('newParagraph').value = '';
                loadParagraphs();
            } catch (error) {
                console.error('Error adding paragraph:', error);
            }
        }

        // Edit paragraph
        function editParagraph(id) {
            const paragraph = paragraphs.find(p => p.id === id);
            if (paragraph) {
                editingId = id;
                document.getElementById('editParagraphText').value = paragraph.text;
                document.getElementById('editModal').classList.remove('hidden');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            editingId = null;
        }

        async function saveEdit() {
            const text = document.getElementById('editParagraphText').value.trim();
            if (!text || !editingId) return;

            try {
                await fetch(`/api/paragraphs/${editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                closeEditModal();
                loadParagraphs();
            } catch (error) {
                console.error('Error updating paragraph:', error);
            }
        }

        // Delete paragraph
        async function deleteParagraph(id) {
            if (!confirm('Are you sure you want to delete this paragraph?')) return;

            try {
                await fetch(`/api/paragraphs/${id}`, { method: 'DELETE' });
                loadParagraphs();
            } catch (error) {
                console.error('Error deleting paragraph:', error);
            }
        }

        // Start test
        async function startTest() {
            const paragraphId = parseInt(document.getElementById('paragraphSelect').value);
            const timeLimit = parseInt(document.getElementById('timeLimit').value);

            if (!paragraphId) {
                alert('Please select a paragraph');
                return;
            }

            if (!timeLimit || timeLimit < 10) {
                alert('Please set a valid time limit (minimum 10 seconds)');
                return;
            }

            try {
                await fetch('/api/test/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paragraphId, timeLimit })
                });
                
                checkTestState();
            } catch (error) {
                console.error('Error starting test:', error);
            }
        }

        // Stop test
        async function stopTest() {
            try {
                await fetch('/api/test/stop', { method: 'POST' });
                checkTestState();
            } catch (error) {
                console.error('Error stopping test:', error);
            }
        }

        // Check test state
        async function checkTestState() {
            try {
                const response = await fetch('/api/test/state');
                const state = await response.json();

                const statusEl = document.getElementById('testStatus');
                const startBtn = document.getElementById('startBtn');
                const stopBtn = document.getElementById('stopBtn');

                if (state.isActive) {
                    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
                    const remaining = Math.max(0, state.timeLimit - elapsed);
                    
                    statusEl.className = 'test-status status-active';
                    statusEl.textContent = `Test is ACTIVE - ${remaining}s remaining`;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    
                    // Auto-stop when time is up
                    if (remaining <= 0) {
                        stopTest();
                    }
                } else {
                    statusEl.className = 'test-status status-inactive';
                    statusEl.textContent = 'Test is NOT active';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            } catch (error) {
                console.error('Error checking test state:', error);
            }
        }

        // Load results
        async function loadResults() {
            try {
                const response = await fetch('/api/results');
                const results = await response.json();

                const tbody = document.getElementById('resultsBody');
                const noResults = document.getElementById('noResults');

                if (results.length === 0) {
                    tbody.innerHTML = '';
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                    tbody.innerHTML = results.map((r, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${escapeHtml(r.participantName)}</td>
                            <td>${r.wpm}</td>
                            <td>${r.cpm}</td>
                            <td>${r.accuracy.toFixed(1)}%</td>
                            <td><strong>${r.finalScore}</strong></td>
                            <td>${new Date(r.timestamp).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading results:', error);
            }
        }

        // Clear results
        async function clearResults() {
            if (!confirm('Are you sure you want to clear all results?')) return;

            try {
                await fetch('/api/results', { method: 'DELETE' });
                loadResults();
            } catch (error) {
                console.error('Error clearing results:', error);
            }
        }

        // Helper function
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter key for login
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
